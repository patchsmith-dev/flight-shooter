<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="星翼突击是一款可直接在浏览器运行的飞行射击小游戏。"
    />
    <title>星翼突击 | Flight Shooter</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script defer src="./src/game.js?v=20260711-overdrive"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-wrap" aria-label="星翼突击游戏区域">
        <div id="game-root"></div>
        <div class="screen-overlay" id="screenOverlay">
          <div class="mission-badge">ARC-27</div>
          <h1 id="overlayTitle">星翼突击</h1>
          <p id="overlayCopy">穿过碎星航道，守住最后一道轨道门。</p>
          <button class="primary-command" id="primaryAction" type="button">启动</button>
        </div>
      </section>

      <aside class="command-deck" aria-label="游戏状态">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <p>STARWING</p>
            <strong>星翼突击</strong>
          </div>
        </div>

        <div class="stat-grid">
          <div class="stat-card">
            <span>得分</span>
            <strong id="scoreValue">0</strong>
          </div>
          <div class="stat-card">
            <span>最高</span>
            <strong id="bestValue">0</strong>
          </div>
          <div class="stat-card">
            <span>关卡</span>
            <strong id="waveValue">1</strong>
          </div>
          <div class="stat-card">
            <span>波次</span>
            <strong id="levelWaveValue">1/10</strong>
          </div>
          <div class="stat-card">
            <span>连击</span>
            <strong id="comboValue">0</strong>
          </div>
          <div class="stat-card">
            <span>生命</span>
            <strong id="livesValue">3</strong>
          </div>
          <div class="stat-card">
            <span>护盾</span>
            <strong id="shieldValue">0</strong>
          </div>
          <div class="stat-card">
            <span>炸弹</span>
            <strong id="bombValue">1</strong>
          </div>
          <div class="stat-card">
            <span>击坠</span>
            <strong id="killsValue">0</strong>
          </div>
          <div class="stat-card">
            <span>擦弹</span>
            <strong id="grazeValue">0</strong>
          </div>
          <div class="stat-card">
            <span>档案</span>
            <strong id="profileValue">D/0</strong>
          </div>
        </div>

        <div class="status-stack" aria-label="战机状态">
          <div class="status-row supply-row">
            <div>
              <span>补给</span>
              <strong id="supplyLabel">0/8</strong>
            </div>
            <div class="status-track supply-track">
              <span id="supplyFill"></span>
            </div>
          </div>
          <div class="status-row">
            <div>
              <span>火力</span>
              <strong id="boostLabel">待命</strong>
            </div>
            <div class="status-track">
              <span id="boostFill"></span>
            </div>
          </div>
          <div class="status-row laser-row">
            <div>
              <span>激光</span>
              <strong id="laserLabel">待命</strong>
            </div>
            <div class="status-track laser-track">
              <span id="laserFill"></span>
            </div>
          </div>
          <div class="status-row dash-row">
            <div>
              <span>冲刺</span>
              <strong id="dashLabel">待命</strong>
            </div>
            <div class="status-track dash-track">
              <span id="dashFill"></span>
            </div>
          </div>
          <div class="status-row overdrive-row">
            <div>
              <span>超载</span>
              <strong id="overdriveLabel">0%</strong>
            </div>
            <div class="status-track overdrive-track">
              <span id="overdriveFill"></span>
            </div>
          </div>
          <div class="status-row drone-row">
            <div>
              <span>僚机</span>
              <strong id="droneLabel">待命</strong>
            </div>
            <div class="status-track drone-track">
              <span id="droneFill"></span>
            </div>
          </div>
          <div class="status-row boss-row" id="bossPanel" hidden>
            <div>
              <span>旗舰</span>
              <strong id="bossLabel">0%</strong>
            </div>
            <div class="status-track boss-track">
              <span id="bossFill"></span>
            </div>
          </div>
        </div>

        <div class="threat-meter" aria-label="威胁等级">
          <div>
            <span>威胁</span>
            <strong id="threatLabel">低</strong>
          </div>
          <div class="meter-track">
            <span id="threatFill"></span>
          </div>
        </div>

        <div class="mission-objectives" aria-label="战术目标">
          <div class="objective-heading">
            <span>目标</span>
            <strong>战术奖励</strong>
          </div>
          <div class="objective-list" id="objectiveList"></div>
        </div>

        <div class="difficulty-panel" aria-label="难度选择">
          <span>难度</span>
          <div class="difficulty-options" id="difficultyOptions">
            <button type="button" data-difficulty="normal">普通</button>
            <button type="button" data-difficulty="veteran">老兵</button>
            <button type="button" data-difficulty="nightmare">噩梦</button>
          </div>
        </div>

        <div class="deck-actions">
          <button class="icon-button" id="pauseButton" type="button" title="暂停" aria-label="暂停">
            II
          </button>
          <button class="icon-button" id="bombButton" type="button" title="脉冲炸弹" aria-label="脉冲炸弹">
            B
          </button>
          <button class="icon-button" id="dashButton" type="button" title="相位冲刺" aria-label="相位冲刺">
            ⇧
          </button>
          <button class="icon-button" id="overdriveButton" type="button" title="超载模式" aria-label="超载模式">
            E
          </button>
          <button class="icon-button" id="audioButton" type="button" title="声音开关" aria-label="声音开关">
            ♪
          </button>
          <button class="icon-button" id="restartButton" type="button" title="重开" aria-label="重开">
            ↻
          </button>
          <button class="icon-button" id="fullscreenButton" type="button" title="全屏" aria-label="全屏">
            ⛶
          </button>
        </div>

        <div class="pilot-feed" aria-live="polite">
          <span></span>
          <p id="feedText">等待发射许可。</p>
        </div>
      </aside>
    </main>
  </body>
</html>
